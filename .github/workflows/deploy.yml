name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/thai-transliterate-mcp
            git pull origin main
            npm update thai-transliterate
            npm ci --production
            sudo systemctl restart thai-transliterate-mcp
            sleep 3
            curl -sf http://localhost:3001/health
